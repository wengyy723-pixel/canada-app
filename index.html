    <script>
        let exchangeRate = 24.0;
        const departureDateStr = '2026-07-17'; 
        let currentlySelectedDate = '2026-07-17'; 
        
        // 核心底層資料防錯與讀取
        let rawStorage = localStorage.getItem('canadaProData');
        let data;
        
        try {
            data = JSON.parse(rawStorage);
            // 🌟 防錯機制：如果使用者本機存的是行李舊格式，強制重置，防止程式死當 🌟
            if (!data || !data.hasOwnProperty('restaurants') || !data.itineraries) {
                throw new Error("Reset storage for new format");
            }
        } catch(e) {
            data = { 
                spots: [{name: '尼加拉瀑布 🇨🇦'}, {name: 'CN Tower 電視塔'}], 
                gifts: [{name: '加拿大楓糖漿', bought: false}], 
                expenses: [],
                restaurants: [{name: 'Tim Hortons (國民神級咖啡店)', visited: true}, {name: 'Chipotle (墨西哥捲餅)', visited: false}, {name: 'Poutine House (經典乾酪澆頭薯條)', visited: false}],
                itineraries: [
                    {date: '2026-07-17', title: '多倫多皮爾遜機場落地 ✈️', desc: 'Day 1 正式抵達加拿大！搭乘 UP Express 前往市區宿舍 check-in。'},
                    {date: '2026-07-18', title: '語言學校報到 + 認識環境 🏫', desc: 'Day 2 早上進行入學分班測驗，下午跟同學去買 Presto 交通卡。'},
                    {date: '2026-07-19', title: '多倫多市中心大探索 🍁', desc: 'Day 3 參觀著名地標 CN Tower 與古老的聖勞倫斯市場吃海鮮。'}
                ]
            };
            localStorage.setItem('canadaProData', JSON.stringify(data));
        }
        
        function save() { localStorage.setItem('canadaProData', JSON.stringify(data)); }

        function getTodayDateString() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function getDayInfo(dateStr) {
            const target = new Date(dateStr);
            const depart = new Date(departureDateStr);
            target.setHours(0,0,0,0);
            depart.setHours(0,0,0,0);
            
            const timeDiff = target - depart;
            const daysDiff = Math.round(timeDiff / (1000 * 60 * 60 * 24));
            
            if (daysDiff >= 0) {
                return {
                    dayLabel: `Day ${String(daysDiff + 1).padStart(2, '0')}`,
                    countdownLabel: daysDiff === 0 ? "出發當天 🇨🇦" : `出發第 ${daysDiff + 1} 天`
                };
            } else {
                return {
                    dayLabel: `前 ${Math.abs(daysDiff)} 天`,
                    countdownLabel: `出發前 ${Math.abs(daysDiff)} 天`
                };
            }
        }

        function triggerBellNotification() {
            const todayStr = getTodayDateString();
            const todaySchedule = data.itineraries.find(item => item.date === todayStr);
            const info = getDayInfo(todayStr);
            
            if (todaySchedule) {
                alert(`🔔 今日行程動態提醒 (${info.dayLabel})：\n\n📅 日期：${todaySchedule.date}\n📌 行程：${todaySchedule.title}\n📝 備忘：${todaySchedule.desc}`);
            } else {
                alert(`🔔 今日行程動態提醒：\n\n今天 (${todayStr}) 是 ${info.countdownLabel}。\n目前沒有安排活動，可以去放鬆探索唷！`);
            }
        }

        function checkBellDot() {
            const todayStr = getTodayDateString();
            const hasEvent = data.itineraries.some(item => item.date === todayStr);
            document.getElementById('bell-dot').style.display = hasEvent ? 'block' : 'none';
        }

        function renderHomeTodayCard() {
            const todayStr = getTodayDateString();
            document.getElementById('home-today-date').innerText = todayStr;
            
            const todaySchedule = data.itineraries.find(item => item.date === todayStr);
            const info = getDayInfo(todayStr);
            
            if (todaySchedule) {
                document.getElementById('home-today-title').innerText = `[${info.dayLabel}] ${todaySchedule.title}`;
                document.getElementById('home-today-desc').innerHTML = `<i class="fa-solid fa-location-dot mr-1"></i>${todaySchedule.desc}`;
            } else {
                document.getElementById('home-today-title').innerText = "今天沒有排行程 ☕";
                document.getElementById('home-today-desc').innerText = `今天是 ${info.countdownLabel}，給自己排個悠閒的漫步行程吧！`;
            }

            document.getElementById('total-itinerary-count').innerText = data.itineraries.length;
        }

        function toggleItineraryModal(show) {
            const modal = document.getElementById('itinerary-modal');
            modal.style.display = show ? 'flex' : 'none';
            if (show) document.getElementById('iti-date').value = currentlySelectedDate;
        }

        function renderHorizontalDaysScrollbar() {
            const scrollContainer = document.getElementById('horizontal-scroll-days');
            if(!scrollContainer) return;
            const todayStr = getTodayDateString();
            const startDate = new Date('2026-07-14');
            let htmlHTML = '';
            
            for (let i = 0; i < 15; i++) {
                const currentLoopDate = new Date(startDate);
                currentLoopDate.setDate(startDate.getDate() + i);
                
                const yyyy = currentLoopDate.getFullYear();
                const mm = String(currentLoopDate.getMonth() + 1).padStart(2, '0');
                const dd = String(currentLoopDate.getDate()).padStart(2, '0');
                const loopDateStr = `${yyyy}-${mm}-${dd}`;
                
                const info = getDayInfo(loopDateStr);
                const isSelected = loopDateStr === currentlySelectedDate;
                const isToday = loopDateStr === todayStr;
                
                let bgStyle = "bg-[#FFEBF4] text-[#2E0F11] border border-pink-100/50"; 
                if (isToday) bgStyle = "bg-rose-200 text-rose-950 border border-rose-300 font-bold";
                if (isSelected) bgStyle = "bg-slate-900 text-white shadow-md font-black"; 
                
                htmlHTML += `
                    <button onclick="selectDateFromScrollbar('${loopDateStr}')" class="flex-shrink-0 flex flex-col items-center justify-center p-3 rounded-2xl min-w-[75px] active:scale-95 transition ${bgStyle}">
                        <span class="text-[10px] uppercase tracking-wide opacity-80">${info.dayLabel}</span>
                        <span class="text-base font-extrabold mt-0.5">${parseInt(dd)}</span>
                        <span class="text-[9px] opacity-70">${parseInt(mm)}月</span>
                    </button>
                `;
            }
            scrollContainer.innerHTML = htmlHTML;
        }

        function selectDateFromScrollbar(dateStr) {
            currentlySelectedDate = dateStr;
            renderHorizontalDaysScrollbar();
            renderSelectedDayDetailPanel();
        }

        function renderSelectedDayDetailPanel() {
            const info = getDayInfo(currentlySelectedDate);
            document.getElementById('selected-day-label').innerText = info.dayLabel;
            document.getElementById('selected-date-label').innerText = currentlySelectedDate;
            document.getElementById('selected-countdown-label').innerText = info.countdownLabel;
            
            const dayEvents = data.itineraries.filter(item => item.date === currentlySelectedDate);
            const contentContainer = document.getElementById('selected-day-events-content');
            
            if (dayEvents.length === 0) {
                contentContainer.innerHTML = `
                    <div class="text-center py-8 space-y-2">
                        <p class="text-3xl">☕</p>
                        <p class="text-xs text-gray-400">這一天目前空空如也，沒有排任何事情。</p>
                        <p class="text-[10px] text-gray-300">可以點選右下角「+」號填入當日備忘或行程！</p>
                    </div>`;
                return;
            }
            
            contentContainer.innerHTML = dayEvents.map((item, index) => {
                const globalIndex = data.itineraries.findIndex(iti => iti.date === item.date && iti.title === item.title);
                return `
                    <div class="bg-slate-50/60 border border-slate-100/50 p-4 rounded-2xl flex justify-between items-start gap-2">
                        <div class="space-y-1">
                            <h4 class="font-black text-sm text-slate-800">${item.title}</h4>
                            <p class="text-xs text-slate-500 leading-relaxed">${item.desc}</p>
                        </div>
                        <button onclick="data.itineraries.splice(${globalIndex},1); save(); renderItineraryTimelineAll();" class="text-gray-300 hover:text-red-500 p-1 transition">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </div>`;
            }).join('');
        }

        function renderItineraryTimelineAll() {
            renderHorizontalDaysScrollbar();
            renderSelectedDayDetailPanel();
            renderHomeTodayCard();
            checkBellDot();
        }

        function addItineraryItem() {
            const dateInput = document.getElementById('iti-date');
            const titleInput = document.getElementById('iti-title');
            const descInput = document.getElementById('iti-desc');

            if (!dateInput.value || !titleInput.value.trim()) {
                alert('請確實填寫「行程名稱」！');
                return;
            }

            data.itineraries.push({
                date: dateInput.value,
                title: titleInput.value.trim(),
                desc: descInput.value.trim() || '無詳細說明'
            });

            data.itineraries.sort((a, b) => new Date(a.date) - new Date(b.date));
            currentlySelectedDate = dateInput.value;

            titleInput.value = '';
            descInput.value = '';
            toggleItineraryModal(false);
            
            save();
            renderItineraryTimelineAll();
        }

        // 口袋餐廳功能
        function addRestaurantItem() {
            const input = document.getElementById('restaurant-name');
            if(!input.value.trim()) return;
            data.restaurants.push({ name: input.value.trim(), visited: false });
            input.value = ''; save(); renderRestaurants();
        }
        function toggleRestaurant(i) {
            data.restaurants[i].visited = !data.restaurants[i].visited;
            save(); renderRestaurants();
        }
        function renderRestaurants() {
            document.getElementById('restaurant-list').innerHTML = data.restaurants.map((r, i) => `
                <li class="flex items-center justify-between bg-white p-3 rounded-xl border shadow-sm cursor-pointer" onclick="toggleRestaurant(${i})">
                    <div class="flex items-center gap-2">
                        <i class="${r.visited ? 'fa-solid fa-circle-check':'fa-regular fa-circle text-gray-300'} text-lg" style="${r.visited ? 'color: #2E0F11;' : ''}"></i>
                        <span class="${r.visited ? 'line-through text-gray-400' : 'text-gray-700'} text-sm font-medium">${r.name}</span>
                    </div>
                    <button onclick="event.stopPropagation(); data.restaurants.splice(${i},1); save(); renderRestaurants();" class="text-gray-400 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can"></i></button>
                </li>
            `).join('');
        }

        // 景點收藏
        function addSpot() {
            const input = document.getElementById('spot-name');
            if(!input.value.trim()) return;
            data.spots.push({ name: input.value.trim() });
            input.value = ''; save(); renderSpots();
        }
        function renderSpots() {
            document.getElementById('spots-list').innerHTML = data.spots.map((s, i) => `
                <div class="flex items-center justify-between bg-white p-3 rounded-xl border shadow-sm">
                    <span class="text-sm font-medium text-slate-700">${s.name}</span>
                    <button onclick="data.spots.splice(${i},1);save();renderSpots();" class="text-gray-400 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        // 伴手禮
        function addGift() {
            const input = document.getElementById('gift-name');
            if(!input.value.trim()) return;
            data.gifts.push({ name: input.value.trim(), bought: false });
            input.value = ''; save(); renderGifts();
        }
        function toggleGift(i) {
            data.gifts[i].bought = !data.gifts[i].bought;
            save(); renderGifts();
        }
        function renderGifts() {
            document.getElementById('gifts-list').innerHTML = data.gifts.map((g, i) => `
                <li class="flex items-center justify-between bg-white p-3 rounded-xl border shadow-sm cursor-pointer" onclick="toggleGift(${i})">
                    <div class="flex items-center gap-2">
                        <i class="${g.bought ? 'fa-solid fa-square-check':'fa-regular fa-square text-gray-300'} text-lg" style="${g.bought ? 'color: #2E0F11;' : ''}"></i>
                        <span class="${g.bought ? 'line-through text-gray-400' : 'text-gray-700'} text-sm">${g.name}</span>
                    </div>
                    <button onclick="event.stopPropagation(); data.gifts.splice(${i},1); save(); renderGifts();" class="text-gray-400 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can"></i></button>
                </li>
            `).join('');
        }

        // 記帳
        function addExpense() {
            const t = document.getElementById('exp-title').value.trim();
            const a = parseFloat(document.getElementById('exp-amount').value);
            if(!t || isNaN(a)) return;
            data.expenses.push({title: t, amount: a});
            document.getElementById('exp-title').value=''; document.getElementById('exp-amount').value='';
            save(); renderExpenses();
        }
        function renderExpenses() {
            let total = 0;
            document.getElementById('expenses-list').innerHTML = data.expenses.map((e, i) => {
                total += e.amount;
                return `
                    <li class="flex justify-between text-xs text-gray-600 bg-white p-3 rounded-xl border shadow-sm items-center">
                        <span>${e.title}</span>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-gray-800">${e.amount} CAD</span>
                            <button onclick="data.expenses.splice(${i},1);save();renderExpenses();" class="text-gray-400 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </li>`;
            }).join('');
            document.getElementById('total-cost').innerText = total.toFixed(2) + ' CAD';
        }

        function convert() {
            const cad = document.getElementById('cad-input').value;
            document.getElementById('twd-output').innerText = (cad ? (parseFloat(cad) * exchangeRate).toFixed(1) : "0.0") + ' TWD';
        }

        function calculateCountdown() {
            const departureDate = new Date('2026-07-17'); 
            const today = new Date();
            departureDate.setHours(0,0,0,0);
            today.setHours(0,0,0,0);
            const timeDiff = departureDate - today;
            const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown-days').innerText = daysLeft > 0 ? daysLeft : 0;
        }

        // 全面初始化
        calculateCountdown();
        fetchLiveExchangeRate();
        renderSpots(); renderGifts(); renderExpenses(); renderRestaurants();
        renderItineraryTimelineAll();
    </script>
</body>
</html>
